<!DOCTYPE html>
<html lang="en"  dir="ltr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <!-- Symbols -->
    <script src="https://kit.fontawesome.com/63a2b78b2b.js" crossorigin="anonymous"></script>
    <!-- JQuery -->
    <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
    <!-- CSS -->
    <link th:href="@{/resources/css/style_navigation.css}" rel="stylesheet"/>

    <link th:href="@{/resources/css/style_general.css}" rel="stylesheet"/>

    <meta charset="UTF-8">
    <title>Partner</title>
</head>
<body>
<nav th:include="navigation :: navigation"></nav>

<section class="main_content">
    <h1>Partner</h1>
    <div class="separating_line"></div>

    <div id="wrapper">
        <div id="create-partner-code" th:if="${!hasPartnerCode}">
            <form method="post" role="form" class="ui form" id="form" th:action="@{/partner}" th:object="${form}">

                <div class="field">
                    <p>Partner-Code</p>
                    <input id="newPartnerCode" th:value="${newPartnerCode}" th:errorclass="fieldError" type="text"
                           required="required" name="newPartnerCode" placeholder="Partner-Code eingeben">
                </div>

                <input type="submit" class="ui button" name="action" value="Code erstellen">
            </form>
        </div>
        <div id="partner-code-container" th:if="${hasPartnerCode}">
            <h4>Dein Persönlicher Partner-Code:</h4>
            <p th:text="${partnerCode}"></p>
        </div>
        <div id="partner-container">
            <h4>Dein Partner</h4>
            <p th:text="${partner}"></p>
        </div>

    </div>
</section>
<!-- Bootstrap Bundle with Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</body>
</html>
