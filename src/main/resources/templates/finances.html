<!DOCTYPE html>
<html lang="en"  dir="ltr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <script src="https://kit.fontawesome.com/63a2b78b2b.js" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <link th:href="@{/resources/css/style.css}" rel="stylesheet"
          href="../static/resources/css/style.css" type="text/css"/>
    <title>Finanzen</title>
    <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
</head>
<body>
<nav th:include="navigation :: navigation"></nav>
<style>

    section #wrapper {
      grid-template-columns: repeat(3, 1fr);
    }

    section #user_balance{
      grid-column: 1 / 3;
      grid-row: 1 / 1;
    }

    section #payment{
      grid-column: 1 / 3;
      grid-row: 2 / 4;
    }

    section #transactions{
      grid-column: 3 / 3;
      grid-row: 1 / 4;
    }

    #user_balance{
      padding: auto;
    }

    .field{
      margin-top: 25px;
    }

    #payment_content{
      padding: 25px;
      padding-top: 50px;
    }

    section #wrapper .container_content p{
       padding-top: 25px;
       text-align: center;
    }

    .input{
    color: white;
    }

    .button_slide {
        text-align: center;
        height: 40px;
        border: none;
        outline: none;
        background: #0d6efd;
        font-size: 18px;
        border-radius: 5px;
        color: white;
        transition-duration: 0.2s;
        cursor: pointer;
    }

    .button_slide:hover {
        background: #0a58ca;
    }

    .button_slide:active {
        box-shadow: inset 0px 0px 4px 3px rgba(0, 0, 0, 0.3);
    }


</style>
<section class="main_content">

    <h1>Finanzen</h1>
    <h3></h3>
    <div id="wrapper">
        <div class="container" id="user_balance">
            <div class="container_head">
                <p id="balance_label"> Ihr Saldo:</p>
            </div>
            <div class="container_content" id="user_balance_content">
                <h2 >
                    <p id=balance th:field="*{balance}" th:text="${balance}">0.0 EURO</p>
                </h2>
            </div>
        </div>
        <div class="container" id="payment">
            <div class="container_head">
                <p id="payment_label"> Einzahlung / Auszahlung:</p>
            </div>
            <div class="container_content" id="payment_content">
                <form   align="center" name ="finances" role="form"  th:object="${form}" th:action="@{/finances}" method="post">
                    <div class="field">
                        <label th:text="Geldbetrag">Geldbetrag</label>
                        <input class="input"  th:field="*{amount}" th:errorclass="is-invalid" required="required" min="0"/> <br/> <br/>
                        <div class="error">
                            <p  th:if="${#fields.hasErrors('amount')}"><font color="red">╮(๑•́ ₃•̀๑)╭Der Betrag kann nicht kleiner als 0 sein.</font></p>
                            <p  th:if="${param.error}"><font color="red">╮(๑•́ ₃•̀๑)╭ Der Betrag kann nicht höher sein als der Saldo.</font></p>
                        </div>
                        <label th:text="Beschreibung">Beschreibung</label>
                        <input class="input" th:field="*{note}" type="text" />
                        <br/> <br/>
                    </div><br/>
                    <button class="button_slide slide_left"  type="submit" name="action" value="deposit">Einzahlung</button>
                    <button class="button_slide slide_left" type="submit" name="action" value="withdraw">Auszahlung</button>
                </form>
            </div>
        </div>

        <div class="container" id="transactions">
            <div class="container_head">
                <p id="transactions_label"> Ihre Transaktionen:</p>
            </div>
            <div class="container_content">
                <div id="bets_empty" th:if="${entries.empty}">
                    <p id="empty_text">Sie haben noch keine Transaktionen getätigt.</p>
                </div>
                <ul th:each="entry : ${entries}">
                    <li>
                        <details>
                            <summary th:text="${entry.amount}"></summary>
                            <span>
                                  <ul>
                                    <li th:text="${entry.note}"></li>
                                    <li th:text="${entry.date}"></li>
                                  </ul>
                                </span>
                        </details>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</section>
</body>
</html>
