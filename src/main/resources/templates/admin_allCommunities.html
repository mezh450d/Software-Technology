<!DOCTYPE html>
<html lang="en"  dir="ltr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <script src="https://kit.fontawesome.com/63a2b78b2b.js" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <link th:href="@{/resources/css/style.css}" rel="stylesheet"
          href="../static/resources/css/style.css" type="text/css"/>
    <title>Finanzen</title>
    <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
</head>
<body>
<nav th:include="navigation :: navigation"></nav>

<section class="main_content">
    <h1>Community Informationen</h1>

    <h3>Suche nach einzelner Gemeinschaft:</h3>
    <form class="ui form" role="form" th:action="@{/admin/communities/getCommunityInfo}" method="get">
        <div class="field">
            <label th:text="Community-Name">Community-Name</label></br>
            <input type="text" name="name"/><br/>
            <div class="error">
                <p  th:if="${param.error}">Please enter the correct name. </p>
            </div>
            <button type="submit">Details</button>
        </div>
    </form>
    <br/><br/>

    <h3>Liste aller Gemeinschaften:</h3>
    <table class="table">
        <thead>
        <tr>
            <td>Community Name</td>
            <td>Details</td>
        </tr>
        </thead>
        <tbody>
        <tr th:each="community : ${communities}">
            <form class="ui form" role="form" th:action="@{/admin/communities/getCommunityInfo}" method="get">
                <input type="hidden" name="name" value="0" th:value="${community.name}"/>
                <td th:text="${community.name}"></td>
                <td>
                    <a href="/admin">
                        <button type="submit">Details</button>
                    </a>
                </td>
            </form>
        </tr>
        </tbody>
    </table>
</section>
</body>
</html>
