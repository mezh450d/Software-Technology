<!DOCTYPE html>
<html lang="en"  dir="ltr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <script src="https://kit.fontawesome.com/63a2b78b2b.js" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <link th:href="@{/resources/css/style.css}" rel="stylesheet"
          href="../static/resources/css/style.css" type="text/css"/>
    <title>Admin</title>
    <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
</head>
<body>
<nav th:include="navigation :: navigation"></nav>
<section class="main_content">
    <h1>Admin</h1>
    <p sec:authorize="isAuthenticated()" th:text="${'Hi ' + #authentication?.name + ', hier kannst du alle Benutzer sehen!'}"></p>
    <div class="input-form">
        <form class="ui form" role="form" th:action="@{/admin/getList}" method="get">
            <div class="field">
                <label th:text="Community_Name">Community_Name</label></br>
                <input type="text" th:name="cname"/></br>
                <input type="submit"/>
            </div>
        </form>
        <a href="allusers.html" th:href="@{/allusers}">Show all users?</a><br>
        <form class="ui form" role="form" th:action="@{/admin/getInfo}" method="get">
            <div class="field">
                <label th:text="User-ID">User-ID</label></br>
                <input type="text" th:name="id"/></br>
                <input type="submit"/>
            </div>
        </form>
    </div>
</section>
</body>
</html>
