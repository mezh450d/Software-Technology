<!DOCTYPE html>
<html lang="en"  dir="ltr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">

    <script src="https://kit.fontawesome.com/63a2b78b2b.js" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <link th:href="@{/resources/css/style.css}" rel="stylesheet"
          href="../static/resources/css/style.css" type="text/css"/>
    <title>Wetten</title>
    <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
</head>
<body>
<nav th:include="navigation :: navigation"></nav>

<section class="main_content">
    <h1>Wetten</h1>

    <table class="table table-dark table-striped">
        <thead>
        <tr>
            <th scope="col"><h3>Datum</h3></th>
            <th scope="col"><h3>Heim</h3></th>
            <th scope="col"><h3>Ergebnis</h3></th>
            <th scope="col"><h3>Gast</h3></th>
            <th scope="col"><h3>Wettbetrag</h3></th>
            <th scope="col"></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="match : ${matches}">
            <form method="post" role="form" class="ui form" id="form" th:action="@{/football}">
                <input type="hidden" name="match" value="0" th:value="${match.id}"/>
                <th><h4 th:text="${match.date}"></h4></th>
                <th><h4 th:text="${match.home}"></h4></th>
                <th>
                    <div class="row">
                        <div class="col mb-2">
                            <input type="number" class="form-control" id="home_score" name="home_score" placeholder="Heim" min="0">
                        </div>
                        <div class="col mb-2">
                            <input type="number" class="form-control" id="guest_score" name="guest_score" placeholder="Gast" min="0">
                        </div>
                    </div>
                </th>
                <th><h4 th:text="${match.guest}"></h4></th>
                <th>
                    <div class="mb-3">
                        <input type="number" class="form-control" id="amount" name="amount" placeholder="Wettbetrag" min="0">
                    </div>
                </th>
                <th>
                    <button type="submit" class="btn btn-primary mb-3"><span> Wetten!</span></button>
                </th>
            </form>
        </tr>
        </tbody>
    </table>
</section>

<!-- Bootstrap Bundle with Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</body>
</html>
