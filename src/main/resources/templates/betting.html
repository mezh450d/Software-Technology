<!DOCTYPE html>
<html lang="en"  dir="ltr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <!-- Symbols -->
    <script src="https://kit.fontawesome.com/63a2b78b2b.js" crossorigin="anonymous"></script>
    <!-- JQuery -->
    <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
    <!-- CSS -->
    <link th:href="@{/resources/css/style_navigation.css}" rel="stylesheet"/>

    <link th:href="@{/resources/css/style_general.css}" rel="stylesheet"/>

    <link th:href="@{/resources/css/style_betting.css}" rel="stylesheet"/>

    <meta charset="UTF-8">
    <title>Admin</title>
</head>
<body>
<nav th:include="navigation :: navigation"></nav>

<section class="main_content">
    <h1>Wetten</h1>
    <div class="separating_line"></div>

    <div class="row">
        <div class="col-sm-6">
            <div class="card text-white bg-dark">
                <div class="card-body">
                    <h4 class="card-title">Lotterie 6 aus 49</h4>
                    <p class="card-text">Hier können Sie den Jackpot in Höhe von 500.000€ gewinnen!</p>
                    <a href="/betting/number" class="btn btn-primary">Wettschein</a>
                </div>
            </div>
        </div>
        <div class="col-sm-6">
            <div class="card text-white bg-dark">
                <div class="card-body">
                    <h4 class="card-title">Fußball</h4>
                    <p class="card-text">Beweisen Sie Ihre Fußballkenntnisse und wetten Sie auf die deutsche Bundesliga!</p>
                    <a href="/betting/football" class="btn btn-primary">Angebot</a>
                </div>
            </div>
        </div>
    </div>
    <br/>
    <div class="row">
        <div class="col-sm-6">
            <div class="card text-white bg-dark">
                <div class="card-body">
                    <h4 class="card-title">Änderungen</h4>
                    <p class="card-text">Hier können Sie die Eingabedaten Ihrer platzierten Wetten verändern!</p>
                    <a href="/betting/change" class="btn btn-primary">jetzt ändern</a>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Bootstrap Bundle with Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</body>
</html>
