<!DOCTYPE html>
<html lang="en"  dir="ltr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <!-- Symbols -->
    <script src="https://kit.fontawesome.com/63a2b78b2b.js" crossorigin="anonymous"></script>
    <!-- JQuery -->
    <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
    <!-- CSS -->
    <link th:href="@{/resources/css/style_navigation.css}" rel="stylesheet"/>

    <link th:href="@{/resources/css/style_general.css}" rel="stylesheet"/>

    <link th:href="@{/resources/css/style_betting.css}" rel="stylesheet"/>

    <meta charset="UTF-8">
    <title>Admin</title>
</head>
<body>
<nav th:include="navigation :: navigation"></nav>

<section class="main_content">
    <h1>Wetten</h1>
    <div class="separating_line"></div>

    <table class="table table-dark table-striped">
        <thead>
        <tr>
            <th scope="col"><h4>Datum</h4></th>
            <th scope="col"><h4>Heim</h4></th>
            <th scope="col"><h4>Ergebnis</h4></th>
            <th scope="col"><h4>Gast</h4></th>
            <th scope="col"><h4>Wettbetrag</h4></th>
            <th scope="col"></th>
            <th scope="col"></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="match : ${matches}">
            <form method="post" role="form" class="ui form" th:action="@{/betting/football}">
                <input type="hidden" name="match" value="0" th:value="${match.id}"/>
                <th><h5 th:text="${match.date}"></h5></th>
                <th><h5 th:text="${match.home}"></h5></th>
                <th>
                    <div class="row">
                        <div class="col mb-2">
                            <input type="number" class="form-control" id="home_score" name="home_score" placeholder="Heim" min="0">
                        </div>
                        <div class="col mb-2">
                            <input type="number" class="form-control" id="guest_score" name="guest_score" placeholder="Gast" min="0">
                        </div>
                    </div>
                </th>
                <th><h5 th:text="${match.guest}"></h5></th>
                <th>
                    <div class="mb-1">
                        <input type="number" class="form-control" id="amount" name="amount" placeholder="Wettbetrag" min="1">
                    </div>
                </th>
                <th>
                    <select class="form-control" name="dropCommunity">
                        <option value="">Einzelwette</option>
                        <option th:each="community : ${personalCommunities}" th:value="${community.name}"
                                th:text="${community.name}"></option>
                    </select>
                </th>
                <th>
                    <button type="submit" class="btn btn-primary mb-3"><span> Wetten!</span></button>
                </th>
            </form>
        </tr>
        </tbody>
    </table>
</section>
</body>
</html>
