<!DOCTYPE html>
<html lang="en"  dir="ltr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <script src="https://kit.fontawesome.com/63a2b78b2b.js" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <link th:href="@{/resources/css/style.css}" rel="stylesheet"
          href="../static/resources/css/style.css" type="text/css"/>
    <title>Gemeinschaften</title>
    <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
</head>

<style>
    section #wrapper {
        margin: auto;
        max-width: 1000px;
        margin-top: 50px;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        grid-gap: 20px;
        grid-auto-rows: minmax(100px, 220px);
    }

    .button_slide {
        text-align: center;
        height: 40px;
        border: none;
        outline: none;
        background: #0d6efd;
        font-size: 18px;
        border-radius: 5px;
        color: white;
        transition-duration: 0.2s;
        cursor: pointer;
    }

    .button_slide:hover {
        background: #0a58ca;
    }

    .button_slide:active {
        box-shadow: inset 0px 0px 4px 3px rgba(0, 0, 0, 0.3);
    }

    #your_communities{
        grid-column: 1;
        grid-row: 1 / 3;
    }

    #other_communities{
        grid-column: 2;
        grid-row: 1 / 3;
    }

    #create{
        grid-column: 1 / 3;
        grid-row: 3;
    }
</style>

<body>
<nav th:include="navigation :: navigation"></nav>

<section class="main_content">
    <h1>Gemeinschaft</h1>

    <div id="wrapper">
        <div class="container" id="your_communities">
            <div class="container_head">
                <p>Ihre Gemeinschaften:</p>
            </div>
            <div class="container_content">
                <table class="table">
                    <thead>
                    <tr>
                        <th scope="col">Gemeinschaftsname</th>
                        <th scope="col">Überblick</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="community : ${personalCommunities} ">
                        <td th:text="${community.name}"></td>
                        <td>
                            <a th:href="@{/community/{communityName}(communityName=${community.name})}">
                                <button>Überblick</button>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="container" id="other_communities">
            <div class="container_head">
                <p>Beitretbare Gemeinschaften:</p>
            </div>
            <div class="container_content">
                <table class="table">
                    <thead>
                    <tr>
                        <th scope="col">Gemeinschaftsname</th>
                        <th scope="col">Beitreten</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="community : ${joinableCommunities} ">
                        <td th:text="${community.name}">CommunityName</td>
                        <td>
                            <a th:href="${'/community/join?communityName=' + community.name}">
                                <button>Beitreten</button>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="container" id="create">
            <div class="container_content">
                <a  href="/community/create">
                    <button  class="button_slide slide_right">erstellen</button>
                </a>
                <a  href="/community/join">
                    <button  class="button_slide slide_right">beitreten</button>
                </a>
            </div>
        </div>
    </div>
</section>

</body>
</html>
