<!DOCTYPE html>
<html lang="en"  dir="ltr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <!-- Symbols -->
    <script src="https://kit.fontawesome.com/63a2b78b2b.js" crossorigin="anonymous"></script>
    <!-- JQuery -->
    <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
    <!-- CSS -->
    <link th:href="@{/resources/css/style_navigation.css}" rel="stylesheet"/>

    <link th:href="@{/resources/css/style_general.css}" rel="stylesheet"/>

    <link th:href="@{/resources/css/style_admin.css}" rel="stylesheet"/>

    <meta charset="UTF-8">
    <title>Admin</title>
</head>
<body>
<nav th:include="navigation :: navigation"></nav>

<section class="main_content">
    <h1>Lottery Informationen</h1>
    <div class="separating_line"></div>

    <h4>Alle Ergebnisse</h4><br/>

    <h3>Football Match:</h3>
    <table class="table">
        <thead>
        <tr>
            <td>Wette</td>
            <td>Ergebnis</td>
            <td>Details</td>
        </tr>
        </thead>
        <tbody>
        <tr th:each="bet : ${evaluatedMatches}">
            <form class="ui form" role="form" th:action="@{/admin/users/getAllCommunities}" method="get">
                <input type="hidden" name="id" value="0" th:value="${bet.id}"/>
                <td th:text="${bet}"></td>
                <td th:text="${bet.getResult()}"></td>
                <td>
                    <a href="/admin">
                        <button type="submit">Details</button>
                    </a>
                </td>
            </form>
        </tr>
        </tbody>
    </table>

    <h3>Number Lotto:</h3>
    <table class="table">
        <thead>
        <tr>
            <td>Wette</td>
            <td>Ergebnis</td>
            <td>Details</td>
        </tr>
        </thead>
        <tbody>
        <tr th:each="bet : ${evaluatedLotteries}">
            <td th:text="${bet}"></td>
            <td th:text="${bet.getResult()}"></td>
            <td>Details</td>
        </tr>
        </tbody>
    </table>

</section>
</body>
</html>
