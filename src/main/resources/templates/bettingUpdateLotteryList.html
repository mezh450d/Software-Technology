<!DOCTYPE html>
<html lang="en"  dir="ltr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <script src="https://kit.fontawesome.com/63a2b78b2b.js" crossorigin="anonymous"></script>
  <meta charset="UTF-8">
  <link th:href="@{/resources/css/style.css}" rel="stylesheet"
        href="../static/resources/css/style.css" type="text/css"/>
  <title>Wetten</title>
  <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
</head>
<body>
<nav th:include="navigation :: navigation"></nav>

<section class="main_content">
  <h1>Wetten</h1>

  <table class="table">
    <thead>
    <tr>
      <th scope="col"></th>
      <th scope="col">Lotto</th>
      <th scope="col">Value</th>
      <th scope="col">Datum</th>
      <th scope="col"></th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="bet : ${betList}" class="tr">
      <th th:text="${bet.id}"></th>
      <th th:text="${bet.reference}"></th>
      <th th:text="${bet.value}"></th>
      <th th:text="${bet.reference.date}"> </th>
      <th>
        <button th:data-id="${bet.id}" th:data-category="${bet.reference.category.ordinal}" th:data-productId="${bet.reference.getId()}"  th:onclick="enterUpdateLotteryView(this.getAttribute('data-id'), this.getAttribute('data-category'), this.getAttribute('data-productId'))"><span> ändern </span></button>
      </th>
    </tr>

    </tbody>
  </table>
  <script>
        function enterUpdateLotteryView(id, category, productId){
            window.location.href = "/betting/updateLotteryView?id=" + id + "&category=" + category + "&productId=" + productId;
        }
    </script>
</section>
</body>
</html>
