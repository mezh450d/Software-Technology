<!DOCTYPE html>
<html lang="en"  dir="ltr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">

  <script src="https://kit.fontawesome.com/63a2b78b2b.js" crossorigin="anonymous"></script>
  <meta charset="UTF-8">
  <link th:href="@{/resources/css/style.css}" rel="stylesheet"
        href="../static/resources/css/style.css" type="text/css"/>
  <title>Wetten</title>
  <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
</head>
<body>
<nav th:include="navigation :: navigation"></nav>

<section class="main_content">
  <h1>Wetten</h1>

  <table class="table table-dark table-striped">
    <thead>
    <tr>
      <th scope="col"><h4>Datum</h4></th>
      <th scope="col"><h4>Heim</h4></th>
      <th scope="col"><h4>Ergebnis</h4></th>
      <th scope="col"><h4>Gast</h4></th>
      <th scope="col"></th>
    </tr>
    </thead>
    <tbody>
    <tr>
      <form method="post" role="form" class="ui form" id="form" th:action="@{/betting/updateFootball}">
        <input type="hidden" name="id" th:value="${match.id}"/>
        <input type="hidden" name="match" th:value="${match.reference.getId()}"/>
        <input type="hidden" name="amount" th:value="${match.bettingAmount.number}"/>
        <th><h5 th:text="${match.reference.date}"></h5></th>
        <th><h5 th:text="${match.reference.home}"></h5></th>
        <th>
          <div class="row">
            <div class="col mb-2">
              <input type="number" class="form-control" id="home_score" name="home_score" placeholder="Heim" min="0">
            </div>
            <div class="col mb-2">
              <input type="number" class="form-control" id="guest_score" name="guest_score" placeholder="Gast" min="0">
            </div>
          </div>
        </th>
        <th><h5 th:text="${match.reference.guest}"></h5></th>
        <th>
          <button type="submit" class="btn btn-primary mb-3"><span> ändern </span></button>
        </th>
      </form>
    </tr>
    </tbody>
  </table>
</section>

<!-- Bootstrap Bundle with Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</body>
</html>
