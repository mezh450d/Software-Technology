<!DOCTYPE html>
<html lang="en"  dir="ltr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <!-- Symbols -->
    <script src="https://kit.fontawesome.com/63a2b78b2b.js" crossorigin="anonymous"></script>
    <!-- JQuery -->
    <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
    <!-- CSS -->
    <link th:href="@{/resources/css/style_navigation.css}" rel="stylesheet"/>

    <link rel="stylesheet" type="text/css" th:href="@{/resources/css/style_login.css}" />

    <link th:href="@{/resources/css/style_general.css}" rel="stylesheet"/>

    <link th:href="@{/resources/css/style_community.css}" rel="stylesheet"/>

    <meta charset="UTF-8">
    <title>Admin</title>
</head>
<body>
<nav th:include="navigation :: navigation"></nav>

<section class="main_content">


    <div class="login_box">
        <div class="head">
            <h1>Gemeinschaft erstellen</h1>
        </div>
        <div class="content">
            <form method="post" role="form"  class="ui form" id="form" th:action="@{/community/create}" th:object="${createForm}">
                <div class="error">
                    <p class="error" th:if="${param.error}">
                        Gemeinschaft mit diesem Name existiert breits!
                    </p>
                </div>


                <div class="field">
                    <label for="name">Name</label>
                    <input id="name" name="name" th:field="*{name}" th:errorclass="fieldError" type="text" required="required" placeholder="Gruppenname"/><br/>
                    <div class="ui negative message" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">
                        <p>Der Name darf nicht leer sein.</p>
                    </div>
                </div>


                <div class="field">
                    <p>Passwort</p>
                    <input  id="password" th:field="*{password}" th:errorclass="fieldError" type="password"
                        required="required" name="password" placeholder="Passwort eingeben">
                    <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Das Passwort darf
                        nicht leer sein.</p>
                </div>


                <button type="submit"  th:text="CreateCommunity">CreateCommunity</button>
            </form>
        </div>
    </div>
</section>
<!-- Bootstrap Bundle with Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</body>
</html>
