@startuml
skinparam sequence {
ArrowColor Black
LifeLineBorderColor Black
LifeLineBackgroundColor Black
Bordercolor Black
BackgroundColor White
}
skinparam shadowing false

autonumber

User -> BettingController: lottery()
BettingController- -> BettingController: catalog.findByCategory()
BettingController-> Spring: add lottery draws to Model
Spring - -> BettingController
BettingController- -> User: Template: catalog.html

User -> BettingController: football()
BettingController- -> BettingController: catalog.findByCategory()
BettingController-> Spring: add football matches to Model
Spring - -> BettingController
BettingController- -> User: Template: catalog.html

User - -> User: fill data
User -> BettingController: placeBet()
BettingController -> BettingManagement: createBet()
BettingManagement -> Finance: withdraw()
Finance - -> BettingManagement: succesful
BettingManagement -> BettingRepository: saveBet()
BettingRepository - -> BettingManagement
BettingManagement - -> BettingController
BettingController- -> User: Template: overview.html
@enduml

