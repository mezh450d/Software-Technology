@startuml
skinparam sequence {
ArrowColor Black
LifeLineBorderColor Black
LifeLineBackgroundColor Black
Bordercolor Black
BackgroundColor White
}
skinparam shadowing false

autonumber

CommunityController -> CommunityManagement: initialize()
CommunityManagement - -> CommunityController 
User -> CommunityController: create()
CommunityController  - -> Spring: add CreateForm to Model
Spring - -> CommunityController
CommunityController  - -> User: Template: community.html
User -> CommunityController: join()
CommunityController -> CommunityManagement: findCommunity() 
CommunityManagement - -> CommunityController: Community community
CommunityController - -> User: Template: community.html
Boss -> CommunityController: communities()
CommunityController -> CommunityManagement: community.findAll()
CommunityManagement - -> CommunityController
CommunityController - -> Boss: Template: communities.html
@enduml

