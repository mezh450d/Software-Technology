 userManagement.findAll()</text><polygon fill="#A80036" points="508.5,592.4922,518.5,596.4922,508.5,600.4922,512.5,596.4922" style="stroke:#A80036;stroke-width:1.0;"/><line style="stroke:#A80036;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="306.5" x2="514.5" y1="596.4922" y2="596.4922"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="21" x="313.5" y="591.4263">17:</text><polygon fill="#A80036" points="863.5,621.625,873.5,625.625,863.5,629.625,867.5,625.625" style="stroke:#A80036;stroke-width:1.0;"/><line style="stroke:#A80036;stroke-width:1.0;" x1="306.5" x2="869.5" y1="625.625" y2="625.625"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="140" x="313.5" y="620.5591">18: add User to Model</text><polygon fill="#A80036" points="317.5,650.7578,307.5,654.7578,317.5,658.7578,313.5,654.7578" style="stroke:#A80036;stroke-width:1.0;"/><line style="stroke:#A80036;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="311.5" x2="879.5" y1="654.7578" y2="654.7578"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="21" x="323.5" y="649.6919">19:</text><polygon fill="#A80036" points="41.5,679.8906,31.5,683.8906,41.5,687.8906,37.5,683.8906" style="stroke:#A80036;stroke-width:1.0;"/><line style="stroke:#A80036;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="35.5" x2="300.5" y1="683.8906" y2="683.8906"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="130" x="47.5" y="678.8247">20: Template: users</text><!--MD5=[f8be1ccefb25a6918cd6ef48235c0c33]
@startuml
participant Boss order 1
participant User order 2
participant UserController order 3
participant UserManagement order 4
participant Salespoint order 5
participant Spring order 6

UserController -> UserManagement : 1: Initialize()
activate UserController
activate UserManagement
UserController <- - UserManagement : 2:
deactivate UserManagement
deactivate UserController

User -> UserController : 3: registerNew()
activate User
alt Errors in RegistrationForm
    activate UserController
    User <- - UserController : 4: registration.html
    deactivate UserController
else Else
    UserController -> UserManagement : 5: createCustomer()
    activate UserController
    activate UserManagement
    UserManagement -> Salespoint : 6: create new UserAccount
    activate Salespoint
    Salespoint -> Salespoint : 7: save UserAccount
    UserManagement <- - Salespoint : 8: UserAccount
    deactivate Salespoint
    UserController <- - UserManagement : 9:
    deactivate UserManagement
    User <- - UserController : 10: Template: index.html
    deactivate UserController
end
User -> UserController : 11: register()
activate UserController
UserController -> Spring : 12: add RegistrationForm to Model
activate Spring
UserController <- - Spring : 13:
deactivate Spring
User <- - UserController : 14: Template: register.html
deactivate UserController
deactivate User

Boss -> UserController : 15: users();
activate Boss
activate UserController
UserController -> UserManagement : 16: userManagement.findAll()
activate UserManagement
UserManagement <- - UserController : 17:
deactivate UserManagement
UserController -> Spring : 18: add User to Model
activate Spring
UserController <- - Spring : 19:
deactivate Spring
Boss <- - UserController : 20: Template: users
deactivate UserController
deactivate Boss
@enduml

