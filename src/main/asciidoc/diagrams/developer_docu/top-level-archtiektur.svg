@startuml
left to right direction
skinparam BackgroundColor White
skinparam shadowing false
skinparam component{
 Bordercolor Black
 Componentstyle uml2
 BackgroundColor CornflowerBlue
 Arrowcolor Black
}
skinparam actor{
 Bordercolor Black
 Componentstyle uml2
 BackgroundColor White
 Arrowcolor Black
}

actor User
actor Visitor
actor Admin
component lottery <<component>> #white{
 component Authentication <<component>> as auth
 component community <<component>> as comm
 component Betting <<component>> as bet
 component "6-from-49" <<component>> as number
 component Football <<component>> as fb
 component Management <<component>> as mana
 component SpringSecurity <<component>> as spring
 component Salespoint <<component>> as sales
}

Visitor ..# auth
User ..# auth
User ..# comm
User ..# bet
comm #..# bet
bet #..# number
bet #..# fb
bet #..# mana
auth #..# spring
comm #..# sales
bet #..# sales
mana #.. Admin
@enduml

